{% extends "admin/base_admin.html" %}
{% block title %}{{ action }} Blog Post{% endblock %}
{% block page_title %}{{ action }} Blog Post{% endblock %}
{% block content %}
<div style="margin-bottom:16px;">
    <a href="/admin/blogs" class="btn btn-secondary btn-sm">← Back to Posts</a>
</div>
<div class="form-card" style="max-width:860px;">
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Post Title *</label>
            <input class="form-input" type="text" name="title" value="{{ post['title'] if post else '' }}" required placeholder="e.g. Why Prefabricated Sheds Are the Future of Industrial Construction">
        </div>
        <div class="form-group">
            <label class="form-label">Excerpt / Summary</label>
            <input class="form-input" type="text" name="excerpt" value="{{ post['excerpt'] if post else '' }}" placeholder="Short description shown in blog listing (1-2 sentences)">
        </div>
        <div class="form-group">
            <label class="form-label">Author</label>
            <input class="form-input" type="text" name="author" value="{{ post['author'] if post else 'Naushad Haji Khan' }}" placeholder="Author name">
        </div>
        <div class="form-group">
            <label class="form-label">Content *</label>
            <p style="font-size:12px;color:var(--smoke);margin-bottom:8px;">Use blank lines between paragraphs. Use **bold text** for emphasis.</p>
            <textarea class="form-textarea" name="content" style="min-height:320px;" required placeholder="Write your blog post content here...
Separate paragraphs with blank lines.

Use **bold** for emphasis.

You can write as much as you need...">{{ post['content'] if post else '' }}</textarea>
        </div>
        <div class="form-group">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
                <input type="checkbox" name="published" value="1" {% if not post or post['published'] %}checked{% endif %} style="width:auto;accent-color:var(--rust);">
                <span class="form-label" style="margin:0;">Publish this post (uncheck to save as draft)</span>
            </label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ action }} Post</button>
            <a href="/admin/blogs" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
