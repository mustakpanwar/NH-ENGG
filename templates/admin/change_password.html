{% extends "admin/base_admin.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="form-card" style="max-width:480px;">
    <p style="color:var(--smoke);font-size:14px;margin-bottom:24px;">Update your admin panel password below.</p>
    <form method="POST">
        <div class="form-group">
            <label class="form-label">Current Password</label>
            <input class="form-input" type="password" name="current" required>
        </div>
        <div class="form-group">
            <label class="form-label">New Password</label>
            <input class="form-input" type="password" name="new_password" required minlength="6">
        </div>
        <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input class="form-input" type="password" name="confirm" required>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Password</button>
            <a href="/admin" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
